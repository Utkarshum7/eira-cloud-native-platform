apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-readonly
rules:
- apiGroups:
  - argoproj.io
  resources:
  - applications
  - applicationsets
  - appprojects
  verbs:
  - get
  - list
  - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-readonly
subjects:
- kind: ServiceAccount
  name: argocd-readonly
  namespace: argocd

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-readonly
  namespace: argocd
