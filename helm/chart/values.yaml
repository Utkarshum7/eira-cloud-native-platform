# Helm Chart Values for HealthOps Application

# Global settings
global:
  domain: healthops.example.com
  environment: production
  imagePullPolicy: IfNotPresent

# Frontend Configuration
frontend:
  name: frontend
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/bock-health/healthops-frontend
    tag: latest
  port: 80
  service:
    type: ClusterIP
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Backend Configuration
backend:
  name: backend
  enabled: true
  replicaCount: 2
  image:
    repository: ghcr.io/bock-health/healthops-backend
    tag: latest
  port: 8080
  service:
    type: ClusterIP
  config:
    NODE_ENV: production
    LOG_LEVEL: info
    DB_HOST: postgres.healthops-postgres.svc.cluster.local
    DB_PORT: 5432
    DB_NAME: healthops
    CORS_ORIGIN: "https://healthops.example.com"
    AWS_REGION: us-east-1
  secrets:
    DB_USER: postgres
    DB_PASSWORD: ""  # CHANGE THIS
    FIREBASE_PROJECT_ID: ""
    FIREBASE_PRIVATE_KEY: ""
    FIREBASE_CLIENT_EMAIL: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Database Configuration
postgres:
  name: postgres
  enabled: true
  image:
    repository: postgres
    tag: "15-alpine"
  port: 5432
  storage:
    size: 20Gi
    storageClassName: ""
  config:
    POSTGRES_INITDB_ARGS: "--encoding=UTF8"
  secrets:
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: ""  # CHANGE THIS
    POSTGRES_DB: healthops
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
  hosts:
    - host: healthops.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    enabled: true
    issuer: letsencrypt-prod

# Monitoring Configuration
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 15d
  grafana:
    enabled: true
    adminPassword: ""  # CHANGE THIS

# Network Policies
networkPolicy:
  enabled: false

# Pod Security Standards
podSecurityPolicy:
  enabled: false

# RBAC Configuration
rbac:
  create: true
