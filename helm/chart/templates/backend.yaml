{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  DB_USER: {{ .Values.backend.secrets.DB_USER }}
  DB_PASSWORD: {{ .Values.backend.secrets.DB_PASSWORD }}
  FIREBASE_PROJECT_ID: {{ .Values.backend.secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_PRIVATE_KEY: {{ .Values.backend.secrets.FIREBASE_PRIVATE_KEY }}
  FIREBASE_CLIENT_EMAIL: {{ .Values.backend.secrets.FIREBASE_CLIENT_EMAIL }}
  AWS_ACCESS_KEY_ID: {{ .Values.backend.secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.backend.secrets.AWS_SECRET_ACCESS_KEY }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: {{ .Release.Namespace }}
data:
  NODE_ENV: {{ .Values.backend.config.NODE_ENV }}
  PORT: "{{ .Values.backend.port }}"
  DB_HOST: {{ .Values.backend.config.DB_HOST }}
  DB_PORT: "{{ .Values.backend.config.DB_PORT }}"
  DB_NAME: {{ .Values.backend.config.DB_NAME }}
  CORS_ORIGIN: {{ .Values.backend.config.CORS_ORIGIN }}
  AWS_REGION: {{ .Values.backend.config.AWS_REGION }}
  LOG_LEVEL: {{ .Values.backend.config.LOG_LEVEL }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: {{ .Values.backend.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.backend.name }}
    spec:
      containers:
      - name: {{ .Values.backend.name }}
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.backend.port }}
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources: {{- toYaml .Values.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 40
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 20
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.backend.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.backend.name }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ .Values.backend.name }}
  ports:
  - port: {{ .Values.backend.port }}
    targetPort: {{ .Values.backend.port }}
    protocol: TCP
    name: http

{{- if .Values.backend.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.backend.name }}-hpa
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.backend.name }}
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
