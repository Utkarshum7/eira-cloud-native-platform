networks:
  eira-network:
    driver: bridge

services:
  backend:
    build: ../EiraFlutterBackend
    container_name: eira-backend
    ports:
      - "8080:8080"
    env_file:
      - ../EiraFlutterBackend/.env.development   # ✅ Correct relative path
    environment:
      NODE_ENV: "production"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_NAME: "postgres"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
    depends_on:
      - db
    networks:
      - eira-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ../EiraUIFlutter
    container_name: eira-frontend
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: "http://backend:8080"
    depends_on:
      - backend
    networks:
      - eira-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15
    container_name: eira-db
    restart: always
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - eira-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
