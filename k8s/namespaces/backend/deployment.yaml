apiVersion: v1
kind: Namespace
metadata:
  name: healthops-backend
  labels:
    name: healthops-backend

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: healthops-backend
type: Opaque
stringData:
  DB_USER: postgres
  DB_PASSWORD: changeme
  FIREBASE_PROJECT_ID: ""
  FIREBASE_PRIVATE_KEY: ""
  FIREBASE_CLIENT_EMAIL: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: healthops-backend
data:
  NODE_ENV: "production"
  PORT: "8080"
  DB_HOST: "postgres.healthops-postgres.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "healthops"
  CORS_ORIGIN: "http://healthops.example.com"
  AWS_REGION: "us-east-1"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: healthops-backend
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: backend
        image: ghcr.io/bock-health/healthops-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: backend-secrets
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /app/config
      volumes:
      - name: config
        configMap:
          name: backend-config

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: healthops-backend
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: healthops-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
