apiVersion: apps/v1
kind: Deployment
metadata:
  name: eira-frontend
  labels:
    app: eira-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eira-frontend
  template:
    metadata:
      labels:
        app: eira-frontend
    spec:
      containers:
      - name: eira-frontend
        image: eira-project-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: BACKEND_URL
          value: "http://eira-backend-service:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
