name: "SBOM Generation"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  generate:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Creates Software Bill of Materials (SBOM) natively reflecting complete application footprint
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: spdx-json
          output-file: 'sbom.spdx.json'

      # Standard build artifact attachment for auditing, licensing, and compliance tracking
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifact
          path: sbom.spdx.json
